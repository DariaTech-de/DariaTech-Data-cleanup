name: Build Windows App

on:
  push:
    branches:
      - main
      - enterprise-hardening
  workflow_dispatch:

jobs:
  build-windows:
    name: Build Windows EXE and installer
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Build EXE with PyInstaller
        run: |
          pyinstaller --clean --noconfirm Duplicat-Clearner.spec

      - name: Install Inno Setup
        run: choco install innosetup -y

      - name: Build installer
        run: iscc installer\duplicat-cleaner.iss

      - name: Create ZIP package
        run: |
          powershell Compress-Archive -Path dist\Duplicat-Clearner.exe -DestinationPath dist\Duplicat-Clearner-Windows.zip -Force

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: Duplicat-Clearner-Windows
          path: |
            dist/Duplicat-Cleaner-Windows.zip
            dist/installer/*.exe
          if-no-files-found: error
